unbind C-b
set-option -g prefix C-s

set -s escape-time 0
set -g mouse on
set-option -g history-limit 5000
set -g status-interval 5
set -g default-terminal "screen-256color"

# use vi for key bindings list view
set-window-option -g mode-keys vi 

set -g base-index 1
set -g renumber-windows on
set -g status-position top
set -g status-left-length 100
set -g status-right-length 100

bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R
bind-key -r C-j next-window
bind-key -r C-k previous-window
bind r source-file ~/.config/tmux/tmux.conf

# popup
bind C-l display-popup -E "\
    tmux list-sessions -F'#{?session_attached,,#{session_name}}' |\
    sed '/^$/d' |
    fzf --reverse \
        --color=bg:-1,bg+:-1,gutter:-1,header:#4c566a \
        --header 'jump-to-session' \
        --preview 'tmux capture-pane -pt {}' \
    	--bind 'enter:execute(tmux switch-client -t {})+accept'"

# change plugin directory
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'arcticicestudio/nord-tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# rebind save key
set -g @resurrect-save 'S'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
